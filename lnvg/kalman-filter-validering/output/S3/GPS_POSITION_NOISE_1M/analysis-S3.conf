analysis {
  scenarioId = "S3"
  scenarioDescription = "GPS position noise sensitivity"

  outputDirectory = "D:/studies/lnvg/kalman-filter-validering/output"
  workbook = "mpu_analysis.xlsx"

  currentPositionMessagesFile = "C:/Temp/currentPositionMessages.csv"
  filterConfigFile = "C:/pvcs_workfiles/itsolutions/allProjects/cato/positioning/src/main/resources/reference.conf"

  cases = [
    {
      caseId = "GPS_POSITION_NOISE_1M"
      caseDescription = "Gaussian noise on GPS position, standard deviation 1 m"
      plotLabel = "1m"

      perturbators = [
        "AddPerturber gpspos1m GpsPositionNoisePerturber stddevMeters=1.0 seed=3001"
      ]
    },
    {
      caseId = "GPS_POSITION_NOISE_3M"
      caseDescription = "Gaussian noise on GPS position, standard deviation 3 m"
      plotLabel = "3m"

      perturbators = [
        "AddPerturber gpspos3m GpsPositionNoisePerturber stddevMeters=3.0 seed=3001"
      ]
    },
    {
      caseId = "GPS_POSITION_NOISE_10M"
      caseDescription = "Gaussian noise on GPS position, standard deviation 10 m"
      plotLabel = "10m"

      perturbators = [
        "AddPerturber gpspos10m GpsPositionNoisePerturber stddevMeters=10.0 seed=3001"
      ]
    }
  ]
}
