transrail.positioning {
  strixFormat = "WGS84"
  estimator.class = se.transrail.cato.positioning.GpsPositionEstimator
  kalmanFilter {
    useSpeedForPositionPrediction = true
    useAccelerationForSpeedPrediction = true
    stateEstimationPeriod = 250ms

    positionProcessNoise = 5.0
    speedProcessNoise = 1.0
    accelerationProcessNoise = 0.1

    initialPositionEstimateUncertainty = 3.0
    initialSpeedEstimateUncertainty = 0.1
    initialAccelerationEstimateUncertainty = 0.1
    intraBatchStalenessThreshold = 500ms
  }

  update {
    active = true
    interval = 50ms
    maxDurationBetweenUpdate = 1200ms
    deadDurationBetweenUpdate = 1000ms
  }

  validation {
    max_rejected_position_messages = 2
    run_not_started_rejection_threshold = 3
    position_validator_tolerance = 100
  }


  gps {
    deroutingPositionThreshold = 2000.0
    deroutingPositionInTunnelThreshold = 10000.0
    deroutingTimeThreshold = 20s
    deroutingTimeInTunnelThreshold = 600s

    defaultPositionUncertainty = 4.0
    defaultSpeedUncertainty = 3.0

    // m / s^2
    maxAcceleration = 10
    // m / s^2
    maxDeceleration = 5
    // km / h
    maxSpeed = 250
    timeout = 3000ms
    maxGpsDistanceFromTrack = 200
    maxGpsSpeedInterval = 3s

    isTargetPointPositionInitializationAllowed = true
    targetPointInitialisationHoldOffDuration = 5000ms
  }

  speedometer {
    isSelfCalibrationAllowed = true
    defaultSpeedUncertainty = 3.0
    minCalibrationDistance = 500.0

    stopped {
      targetpointPoleLockDistance = 150
      targetpointRunLockDistance = 100
    }

    sources {
      original.calibration {
        value = 1
        size = 50
        minCalibrationSize = 10
        thresholdLower = 0.50
        thresholdUpper = 2.00
        savefile = "speedometer_results.log"
        timeout = 2s
      }
      secondary.calibration {
        value = 1
        size = 50
        minCalibrationSize = 10
        thresholdLower = 0.50
        thresholdUpper = 2.00
        savefile = "speedometer_secondary_calibration.save"
        timeout = 2s
      }
    }

    polePositionEstimator {

    }
  }

  rfidReader {
    url = "http://%s:8080/Position"
    rfidIp = localhost
    rfidIp = ${?RFID}
    file = rfid.position
    intervalMs = 800
    connectionTimeoutMs=800
    readTimeoutMs=800
  }

  positionZeroOnNewTrainConfigMarkedAsDummy = false

  MotionHandler {
    speedTrend {
      bufferSize = 10
      sampleSize = 10
      changeLimit = 3600
      lateWeightFactor = 1

      positive {
        lowerLimit = 0.8333 # 3 km / h
        upperLimit = 1.6667 # 6 km / h
      }
      negative {
        lowerLimit = -0.8333 # -3 km / h
        upperLimit = -1.6667 # 6 km / h
      }
    }

    SpeedFilter{
        useFilter = true
        alfa      = 0.2
        sampleSize = 15
    }

    accelerationTrend {
      bufferSize = 10
      sampleSize = 10
      changeLimit = 2
      lateWeightFactor = 0.5

      positive {
        lowerLimit = 0.05 # m / s^2
        upperLimit = 0.075 # m / s^2
      }
      negative {
        lowerLimit = -0.05 # m / s^2
        upperLimit = -0.075 # m / s^2
      }
    }
  }
}
